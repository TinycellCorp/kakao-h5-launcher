<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>카카오 H5 게임 런처</title>
  <style>
    :root { color-scheme: light; --bg:#f5f6f8; --card:#fff; --line:#e9eaed; --txt:#1c1c1e; --sub:#888; --kakao:#FEE500; }
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif; margin:0; background:var(--bg); color:var(--txt); }
    .wrap { max-width:600px; margin:0 auto; padding:16px 14px 40px; }
    header { position:sticky; top:0; background:var(--bg); padding:8px 0 12px; z-index:10; }
    h1 { font-size:18px; margin:4px 0 12px; display:flex; align-items:center; gap:8px; }
    h1 .dot { width:10px; height:10px; border-radius:50%; background:var(--kakao); box-shadow:0 0 0 3px rgba(254,229,0,.25); }
    .search { width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:#fff; }
    .meta { font-size:12px; color:var(--sub); margin:10px 2px 4px; }
    .group-title { font-size:13px; font-weight:800; color:#555; margin:18px 2px 8px; padding-left:6px; border-left:3px solid var(--kakao); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button.game { display:flex; flex-direction:column; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 12px; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04); transition:transform .05s; text-align:left; color:var(--txt); font:inherit; }
    button.game:active { transform:scale(.97); }
    button.game .name { font-size:14px; font-weight:700; line-height:1.3; }
    button.game .id { font-size:11px; color:var(--sub); }
    .hidden { display:none !important; }
    .empty { text-align:center; color:var(--sub); padding:40px 0; font-size:14px; }

    /* 모달 */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:100; }
    .overlay.show { display:flex; }
    .sheet { background:#fff; width:100%; max-width:600px; border-radius:18px 18px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); animation:up .18s ease; }
    @keyframes up { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .sheet h2 { font-size:16px; margin:2px 0 2px; }
    .sheet .sub { font-size:12px; color:var(--sub); margin:0 0 14px; }
    .opt-row { display:flex; align-items:stretch; gap:8px; margin-bottom:9px; }
    .opt { flex:1; display:flex; align-items:center; justify-content:space-between; gap:10px; text-decoration:none; padding:14px 16px; border-radius:11px; font-size:15px; font-weight:700; border:1px solid var(--line); }
    .copy { flex:0 0 auto; width:54px; border:1px solid var(--line); background:#fff; border-radius:11px; font:inherit; font-size:13px; font-weight:700; color:#555; cursor:pointer; }
    .copy:active { transform:scale(.95); }
    .copy.disabled { opacity:.4; pointer-events:none; }
    .toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:#1c1c1e; color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; font-weight:700; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; }
    .toast.show { opacity:1; }
    .opt small { font-size:11px; font-weight:600; opacity:.7; }
    .opt.qa   { background:#fff8d6; color:#8a6d00; }
    .opt.qaov { background:#fff8d6; color:#8a6d00; }
    .opt.live { background:#e2f6e7; color:#1e8449; }
    .opt.liveov { background:#e2f6e7; color:#1e8449; }
    .opt.disabled { opacity:.4; pointer-events:none; }
    .opt .tag { font-size:10px; background:rgba(0,0,0,.08); padding:2px 7px; border-radius:999px; }
    .close { width:100%; padding:13px; border:none; background:#eef0f3; border-radius:11px; font-size:14px; font-weight:700; color:#555; cursor:pointer; margin-top:4px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot"></span>카카오 H5 게임 런처</h1>
    <input class="search" id="q" type="search" placeholder="게임 이름 / 번호 검색…" autocomplete="off" />
    <div class="meta" id="meta"></div>
  </header>
  <div id="list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 진입 옵션 모달 -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <h2 id="m-name"></h2>
    <p class="sub" id="m-sub"></p>
    <div class="opt-row">
      <a class="opt qa"   id="m-qa"   target="_blank" rel="noopener">QA <span class="tag">기본</span></a>
      <button class="copy" data-for="m-qa" title="링크 복사">복사</button>
    </div>
    <div class="opt-row">
      <a class="opt qaov" id="m-qaov" target="_blank" rel="noopener">QA + 로그오버레이 <span class="tag">logOverlay</span></a>
      <button class="copy" data-for="m-qaov" title="링크 복사">복사</button>
    </div>
    <div class="opt-row">
      <a class="opt live"   id="m-live"   target="_blank" rel="noopener">Live <span class="tag">기본</span></a>
      <button class="copy" data-for="m-live" title="링크 복사">복사</button>
    </div>
    <div class="opt-row">
      <a class="opt liveov" id="m-liveov" target="_blank" rel="noopener">Live + 로그오버레이 <span class="tag">logOverlay</span></a>
      <button class="copy" data-for="m-liveov" title="링크 복사">복사</button>
    </div>
    <button class="close" id="m-close">닫기</button>
  </div>
</div>

const HOST = { qa:'qa-gameplay.game.kakao.com', live:'gameplay.game.kakao.com' };
// 카카오 테스트 공용 진입 링크 — 게임 URL을 url 파라미터로 감싸 채팅방 전송 후 실행 확인
const TEST_ENTRY = 'https://gameplay.kakao.com/entry/test/games?url=';
function urlFor(game, env, overlay) {
  const code = env === 'live' ? game.live : game.qa;
  if (!code) return null;
  let u = `https://${HOST[env]}/h5/${code}/index.html?provider=kakao`;
  if (overlay) u += '&logOverlay=true';
  // 게임 URL을 인코딩해 테스트 공용 링크 뒤에 부착 (외부 쿼리와 분리)
  return TEST_ENTRY + encodeURIComponent(u);
}

const listEl = document.getElementById('list');
const qEl = document.getElementById('q');
const metaEl = document.getElementById('meta');

// ===== 영문 자판 → 한글 변환 (두벌식) =====
// 예: "vmfpswm" → "프렌즈". 영문으로 친 입력을 한글 음절로 조합해 검색에 활용.
const EN2KO = {
  q:'ㅂ', w:'ㅈ', e:'ㄷ', r:'ㄱ', t:'ㅅ', y:'ㅛ', u:'ㅕ', i:'ㅑ', o:'ㅐ', p:'ㅔ',
  a:'ㅁ', s:'ㄴ', d:'ㅇ', f:'ㄹ', g:'ㅎ', h:'ㅗ', j:'ㅓ', k:'ㅏ', l:'ㅣ',
  z:'ㅋ', x:'ㅌ', c:'ㅊ', v:'ㅍ', b:'ㅠ', n:'ㅜ', m:'ㅡ',
  Q:'ㅃ', W:'ㅉ', E:'ㄸ', R:'ㄲ', T:'ㅆ', O:'ㅒ', P:'ㅖ'
};
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const JUNG = ['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const JONG = ['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
// 복합 모음/겹받침 결합 규칙
const JUNG_COMBO = { 'ㅗㅏ':'ㅘ','ㅗㅐ':'ㅙ','ㅗㅣ':'ㅚ','ㅜㅓ':'ㅝ','ㅜㅔ':'ㅞ','ㅜㅣ':'ㅟ','ㅡㅣ':'ㅢ' };
const JONG_COMBO = { 'ㄱㅅ':'ㄳ','ㄴㅈ':'ㄵ','ㄴㅎ':'ㄶ','ㄹㄱ':'ㄺ','ㄹㅁ':'ㄻ','ㄹㅂ':'ㄼ','ㄹㅅ':'ㄽ','ㄹㅌ':'ㄾ','ㄹㅍ':'ㄿ','ㄹㅎ':'ㅀ','ㅂㅅ':'ㅄ' };
// 겹받침 분해 — 받침 뒤 모음이 오면 끝자음만 다음 음절 초성으로 이관
const JONG_SPLIT = { 'ㄳ':['ㄱ','ㅅ'],'ㄵ':['ㄴ','ㅈ'],'ㄶ':['ㄴ','ㅎ'],'ㄺ':['ㄹ','ㄱ'],'ㄻ':['ㄹ','ㅁ'],'ㄼ':['ㄹ','ㅂ'],'ㄽ':['ㄹ','ㅅ'],'ㄾ':['ㄹ','ㅌ'],'ㄿ':['ㄹ','ㅍ'],'ㅀ':['ㄹ','ㅎ'],'ㅄ':['ㅂ','ㅅ'] };
const CHO_I = c => CHO.indexOf(c), JUNG_I = v => JUNG.indexOf(v), JONG_I = t => JONG.indexOf(t);
const isCho = c => CHO.includes(c), isJung = c => JUNG.includes(c);

function enToKo(str) {
  // 영문 → 자모열로 치환 (한글/숫자/기타는 그대로 통과)
  let jamo = '';
  for (const ch of str) jamo += (EN2KO[ch] !== undefined ? EN2KO[ch] : ch);

  // 자모 오토마타로 음절 조합
  let out = '';
  let cho = -1, jung = -1, jong = -1;
  const emit = () => { // 현재 조합 음절(cho+jung 필수)을 완성 문자로
    out += String.fromCharCode(0xAC00 + (cho * 21 + jung) * 28 + (jong < 0 ? 0 : jong));
    cho = jung = jong = -1;
  };
  const flush = () => {
    if (cho < 0) return;
    if (jung < 0) { out += CHO[cho]; cho = -1; jong = -1; return; } // 초성 낱자만
    emit();
  };
  for (const c of jamo) {
    if (isCho(c)) {
      if (cho < 0) { cho = CHO_I(c); }
      else if (jung < 0) { flush(); cho = CHO_I(c); }
      else if (jong < 0) { jong = JONG_I(c); }
      else {
        const combo = JONG_COMBO[JONG[jong] + c];
        if (combo) { jong = JONG_I(combo); }
        else { emit(); cho = CHO_I(c); }
      }
    } else if (isJung(c)) {
      if (cho < 0) { flush(); out += c; }
      else if (jung < 0) { jung = JUNG_I(c); }
      else if (jong < 0) {
        const combo = JUNG_COMBO[JUNG[jung] + c];
        if (combo) { jung = JUNG_I(combo); }
        else { emit(); out += c; }
      } else {
        // 받침 있고 모음 → 받침(겹받침이면 끝자음)을 다음 음절 초성으로 이관
        const jc = JONG[jong];
        const sp = JONG_SPLIT[jc];
        if (sp) { jong = JONG_I(sp[0]); emit(); cho = CHO_I(sp[1]); jung = JUNG_I(c); }
        else { jong = -1; const moved = jc; emit(); cho = CHO_I(moved); jung = JUNG_I(c); }
      }
    } else { flush(); out += c; } // 한글이 아닌 문자
  }
  flush();
  return out;
}

function render() {
  const raw = qEl.value.trim();
  const kw = raw.toLowerCase();
  const kwKo = enToKo(raw);                 // 영문 자판 → 한글 변환 키워드
  const nospace = s => s.replace(/\s+/g, '');
  const kwNs = nospace(kw);                  // 공백 제거 키워드
  const kwKoNs = nospace(kwKo);              // 공백 제거 한글변환 키워드
  const filtered = GAMES.filter(g => {
    if (!kw) return true;
    const name = g.name.toLowerCase();
    const nameNs = nospace(name);            // 공백 제거 게임명
    return name.includes(kw)
      || nameNs.includes(kwNs)               // 띄어쓰기 무시 매칭
      || (kwKo && (g.name.includes(kwKo) || nospace(g.name).includes(kwKoNs)))
      || (g.id && g.id.includes(kw))
      || (g.qa && g.qa.includes(kw))
      || (g.live && g.live.includes(kw))
      || String(g.no).includes(kw);
  });
  listEl.innerHTML = '';
  metaEl.textContent = `${filtered.length}개 · 탭하면 진입 옵션 선택`;
  if (!filtered.length) { listEl.innerHTML = '<div class="empty">검색 결과 없음</div>'; return; }

  let lastGroup = null, grid = null;
  filtered.forEach(g => {
    if (g.g !== lastGroup) {
      lastGroup = g.g;
      const t = document.createElement('div');
      t.className = 'group-title'; t.textContent = g.g;
      listEl.appendChild(t);
      grid = document.createElement('div'); grid.className = 'grid';
      listEl.appendChild(grid);
    }
    const b = document.createElement('button');
    b.className = 'game';
    b.innerHTML = `<span class="name">${g.no}. ${g.name}</span>
      <span class="id">${g.id ? 'ID ' + g.id : 'ID 미정'}${g.live ? '' : ' · QA만'}</span>`;
    b.addEventListener('click', () => openSheet(g));
    grid.appendChild(b);
  });
}

// ===== 모달 =====
const overlay = document.getElementById('overlay');
function setOpt(el, url) {
  if (url) { el.href = url; el.classList.remove('disabled'); }
  else { el.removeAttribute('href'); el.classList.add('disabled'); }
  // 같은 옵션의 복사 버튼도 동기화
  const copyBtn = document.querySelector(`.copy[data-for="${el.id}"]`);
  if (copyBtn) copyBtn.classList.toggle('disabled', !url);
}

// ===== 링크 복사 + 토스트 =====
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}
async function copyLink(url) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(url);
    } else { // file:// 등 비보안 컨텍스트 폴백
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
    }
    showToast('링크 복사됨 · 채팅방에 붙여넣기');
  } catch (e) { showToast('복사 실패'); }
}
document.querySelectorAll('.copy').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = document.getElementById(btn.dataset.for);
    if (a && a.href && !a.classList.contains('disabled')) copyLink(a.href);
  });
});
function openSheet(g) {
  document.getElementById('m-name').textContent = `${g.no}. ${g.name}`;
  document.getElementById('m-sub').textContent = g.id ? `ID ${g.id}` : '진입 환경을 선택하세요';
  setOpt(document.getElementById('m-qa'),     urlFor(g,'qa',false));
  setOpt(document.getElementById('m-qaov'),   urlFor(g,'qa',true));
  setOpt(document.getElementById('m-live'),   urlFor(g,'live',false));
  setOpt(document.getElementById('m-liveov'), urlFor(g,'live',true));
  overlay.classList.add('show');
}
function closeSheet() { overlay.classList.remove('show'); }
document.getElementById('m-close').addEventListener('click', closeSheet);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

qEl.addEventListener('input', render);
render();
</script>
</body>
</html>
