<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>카카오 H5 게임 런처</title>
  <style>
    :root { color-scheme: light; --bg:#f5f6f8; --card:#fff; --line:#e9eaed; --txt:#1c1c1e; --sub:#888; --kakao:#FEE500; }
    * { box-sizing: border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif; margin:0; background:var(--bg); color:var(--txt); }
    .wrap { max-width:600px; margin:0 auto; padding:16px 14px 40px; }
    header { position:sticky; top:0; background:var(--bg); padding:8px 0 12px; z-index:10; }
    h1 { font-size:18px; margin:4px 0 12px; display:flex; align-items:center; gap:8px; }
    h1 .dot { width:10px; height:10px; border-radius:50%; background:var(--kakao); box-shadow:0 0 0 3px rgba(254,229,0,.25); }
    .search { width:100%; padding:11px 14px; border:1px solid var(--line); border-radius:10px; font-size:15px; background:#fff; }
    .meta { font-size:12px; color:var(--sub); margin:10px 2px 4px; }
    .group-title { font-size:13px; font-weight:800; color:#555; margin:18px 2px 8px; padding-left:6px; border-left:3px solid var(--kakao); }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button.game { display:flex; flex-direction:column; gap:4px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 12px; cursor:pointer; box-shadow:0 1px 2px rgba(0,0,0,.04); transition:transform .05s; text-align:left; color:var(--txt); font:inherit; }
    button.game:active { transform:scale(.97); }
    button.game .name { font-size:14px; font-weight:700; line-height:1.3; }
    button.game .id { font-size:11px; color:var(--sub); }
    .hidden { display:none !important; }
    .empty { text-align:center; color:var(--sub); padding:40px 0; font-size:14px; }

    /* 모달 */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:100; }
    .overlay.show { display:flex; }
    .sheet { background:#fff; width:100%; max-width:600px; border-radius:18px 18px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); animation:up .18s ease; }
    @keyframes up { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .sheet h2 { font-size:16px; margin:2px 0 2px; }
    .sheet .sub { font-size:12px; color:var(--sub); margin:0 0 14px; }
    .opt { display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; text-decoration:none; padding:14px 16px; border-radius:11px; font-size:15px; font-weight:700; margin-bottom:9px; border:1px solid var(--line); }
    .opt small { font-size:11px; font-weight:600; opacity:.7; }
    .opt.qa   { background:#fff8d6; color:#8a6d00; }
    .opt.qaov { background:#fff8d6; color:#8a6d00; }
    .opt.live { background:#e2f6e7; color:#1e8449; }
    .opt.liveov { background:#e2f6e7; color:#1e8449; }
    .opt.disabled { opacity:.4; pointer-events:none; }
    .opt .tag { font-size:10px; background:rgba(0,0,0,.08); padding:2px 7px; border-radius:999px; }
    .close { width:100%; padding:13px; border:none; background:#eef0f3; border-radius:11px; font-size:14px; font-weight:700; color:#555; cursor:pointer; margin-top:4px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot"></span>카카오 H5 게임 런처</h1>
    <input class="search" id="q" type="search" placeholder="게임 이름 / 번호 검색…" autocomplete="off" />
    <div class="meta" id="meta"></div>
  </header>
  <div id="list"></div>
</div>

<!-- 진입 옵션 모달 -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <h2 id="m-name"></h2>
    <p class="sub" id="m-sub"></p>
    <a class="opt qa"     id="m-qa"     target="_blank" rel="noopener">QA <span class="tag">기본</span></a>
    <a class="opt qaov"   id="m-qaov"   target="_blank" rel="noopener">QA + 로그오버레이 <span class="tag">logOverlay</span></a>
    <a class="opt live"   id="m-live"   target="_blank" rel="noopener">Live <span class="tag">기본</span></a>
    <a class="opt liveov" id="m-liveov" target="_blank" rel="noopener">Live + 로그오버레이 <span class="tag">logOverlay</span></a>
    <button class="close" id="m-close">닫기</button>
  </div>
</div>

  { g:'1차 업데이트', no:34, id:'', name:'울소트 퍼즐',      qa:'52c1wzya', live:'52c1wzya' },
  { g:'1차 업데이트', no:35, id:'', name:'도트 매니아',      qa:'l7tiepxy', live:'l7tiepxy' },
];

const HOST = { qa:'qa-gameplay.game.kakao.com', live:'gameplay.game.kakao.com' };
function urlFor(game, env, overlay) {
  const code = env === 'live' ? game.live : game.qa;
  if (!code) return null;
  let u = `https://${HOST[env]}/h5/${code}/index.html?provider=kakao`;
  if (overlay) u += '&logOverlay=true';
  return u;
}

const listEl = document.getElementById('list');
const qEl = document.getElementById('q');
const metaEl = document.getElementById('meta');

function render() {
  const kw = qEl.value.trim().toLowerCase();
  const filtered = GAMES.filter(g =>
    !kw || g.name.toLowerCase().includes(kw) || (g.id && g.id.includes(kw)) || String(g.no).includes(kw)
  );
  listEl.innerHTML = '';
  metaEl.textContent = `${filtered.length}개 · 탭하면 진입 옵션 선택`;
  if (!filtered.length) { listEl.innerHTML = '<div class="empty">검색 결과 없음</div>'; return; }

  let lastGroup = null, grid = null;
  filtered.forEach(g => {
    if (g.g !== lastGroup) {
      lastGroup = g.g;
      const t = document.createElement('div');
      t.className = 'group-title'; t.textContent = g.g;
      listEl.appendChild(t);
      grid = document.createElement('div'); grid.className = 'grid';
      listEl.appendChild(grid);
    }
    const b = document.createElement('button');
    b.className = 'game';
    b.innerHTML = `<span class="name">${g.no}. ${g.name}</span>
      <span class="id">${g.id ? 'ID ' + g.id : 'ID 미정'}${g.live ? '' : ' · QA만'}</span>`;
    b.addEventListener('click', () => openSheet(g));
    grid.appendChild(b);
  });
}

// ===== 모달 =====
const overlay = document.getElementById('overlay');
function setOpt(el, url) {
  if (url) { el.href = url; el.classList.remove('disabled'); }
  else { el.removeAttribute('href'); el.classList.add('disabled'); }
}
function openSheet(g) {
  document.getElementById('m-name').textContent = `${g.no}. ${g.name}`;
  document.getElementById('m-sub').textContent = g.id ? `ID ${g.id}` : '진입 환경을 선택하세요';
  setOpt(document.getElementById('m-qa'),     urlFor(g,'qa',false));
  setOpt(document.getElementById('m-qaov'),   urlFor(g,'qa',true));
  setOpt(document.getElementById('m-live'),   urlFor(g,'live',false));
  setOpt(document.getElementById('m-liveov'), urlFor(g,'live',true));
  overlay.classList.add('show');
}
function closeSheet() { overlay.classList.remove('show'); }
document.getElementById('m-close').addEventListener('click', closeSheet);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

qEl.addEventListener('input', render);
render();
</script>
</body>
</html>
